<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ports Explorer</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0e0f11;
      --panel:     #14161a;
      --border:    #252830;
      --accent:    #00d4aa;
      --accent2:   #ff6b35;
      --text:      #c8cdd8;
      --text-dim:  #525866;
      --text-head: #e8eaf0;
      --selected:  #002a22;
      --selected-b:#00d4aa;
      --rev-sel:   #2a1500;
      --rev-b:     #ff6b35;
      --row-hover: #1a1d24;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      overflow: hidden;
    }

    /* ── Layout ──────────────────────────────────────────── */
    #shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 12px;
      gap: 10px;
    }

    #header {
      flex: 0 0 auto;
      display: flex;
      align-items: baseline;
      gap: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    #header h1 {
      font-family: var(--sans);
      font-weight: 800;
      font-size: 22px;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    #header .tag {
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* Top section: 3 columns */
    #top {
      flex: 1 1 0;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    /* Bottom section: fixed height */
    #bottom {
      flex: 0 0 220px;
      min-height: 0;
    }

    /* ── Panel ───────────────────────────────────────────── */
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      flex: 0 0 auto;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-header .panel-title {
      font-family: var(--sans);
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .panel-header .badge {
      margin-left: auto;
      font-size: 10px;
      color: var(--text-dim);
      background: var(--border);
      padding: 1px 6px;
      border-radius: 10px;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex: 0 0 auto;
    }
    .dot.orange { background: var(--accent2); }
    .dot.dim    { background: var(--text-dim); }

    .panel-body {
      flex: 1 1 0;
      overflow-y: auto;
      padding: 4px 0;
    }

    /* custom scrollbar */
    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── List rows ───────────────────────────────────────── */
    .list-row {
      padding: 6px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-size: 12px;
      border-left: 2px solid transparent;
      transition: background 0.1s, border-color 0.1s;
      user-select: none;
    }

    .list-row:hover {
      background: var(--row-hover);
    }

    .list-row.selected {
      background: var(--selected);
      border-left-color: var(--selected-b);
      color: var(--accent);
    }

    .list-row.selected-rev {
      background: var(--rev-sel);
      border-left-color: var(--rev-b);
      color: var(--accent2);
    }

    .list-row .prefix-tag {
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 1px 5px;
      border-radius: 3px;
      flex: 0 0 auto;
    }

    .prefix-tag.direct {
      background: #002a22;
      color: var(--accent);
      border: 1px solid #00604a;
    }

    .prefix-tag.reverse {
      background: #2a1500;
      color: var(--accent2);
      border: 1px solid #604020;
    }

    /* ── Bottom detail panel ─────────────────────────────── */
    #desc-panel .panel-body {
      padding: 0;
    }

    .desc-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11.5px;
    }

    .desc-table thead tr {
      background: #0e0f11;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .desc-table thead th {
      padding: 6px 10px;
      text-align: left;
      color: var(--text-dim);
      font-weight: 500;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    .desc-table tbody tr {
      border-bottom: 1px solid #1a1d24;
      transition: background 0.1s;
    }

    .desc-table tbody tr:hover {
      background: var(--row-hover);
    }

    .desc-table td {
      padding: 5px 10px;
      color: var(--text);
      vertical-align: top;
    }

    .desc-table td.port-cell {
      color: var(--accent);
      font-weight: 500;
      white-space: nowrap;
    }

    .desc-table td.proto-cell {
      color: var(--text-dim);
      white-space: nowrap;
    }

    /* ── Empty / placeholder states ──────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 6px;
      color: var(--text-dim);
      font-size: 11px;
      text-align: center;
      padding: 20px;
      line-height: 1.6;
    }

    .empty-state .icon {
      font-size: 22px;
      opacity: 0.3;
      margin-bottom: 4px;
    }

    /* ── HTMX indicator ──────────────────────────────────── */
    .htmx-indicator { opacity: 0; transition: opacity 0.15s; }
    .htmx-request .htmx-indicator { opacity: 1; }
  </style>
</head>
<body>

<div id="shell">

  <!-- Header -->
  <div id="header">
    <h1>Ports Explorer</h1>
  </div>

  <!-- Top: 3 columns -->
  <div id="top">

    <!-- Column 1: from_role -->
    <div class="panel">
      <div class="panel-header">
        <span class="dot"></span>
        <span class="panel-title">Source Role</span>
        <span class="badge">{{ roles|length }}</span>
      </div>
      <div class="panel-body">
        {% for role in roles %}
        <div class="list-row"
             hx-get="/to_roles"
             hx-vals='{"from_role": "{{ role }}"}'
             hx-target="#col2"
             hx-swap="innerHTML"
             hx-trigger="click"
             onclick="selectRow(this, 'col1')">
          {{ role }}
        </div>
        {% endfor %}
      </div>
    </div>

    <!-- Column 2: to_role -->
    <div class="panel">
      <div class="panel-header">
        <span class="dot"></span>
        <span class="panel-title">Target Role</span>
      </div>
      <div id="col2" class="panel-body">
        <div class="empty-state">
          <div class="icon">↑</div>
          Select a source role
        </div>
      </div>
    </div>

    <!-- Column 3: ports -->
    <div class="panel">
      <div class="panel-header">
        <span class="dot"></span>
        <span class="panel-title">Ports</span>
      </div>
      <div id="col3" class="panel-body">
        <div class="empty-state">
          <div class="icon">↑</div>
          Select source &amp; target roles
        </div>
      </div>
    </div>

  </div>

  <!-- Bottom: descriptions -->
  <div id="bottom">
    <div id="desc-panel" class="panel" style="height:100%">
      <div class="panel-header">
        <span class="dot"></span>
        <span class="panel-title">Details</span>
      </div>
      <div id="col4" class="panel-body">
        <div class="empty-state">
          Select a port entry to see matching rules
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  function selectRow(el, colId) {
    const body = el.closest('.panel-body') || el.parentNode;
    body.querySelectorAll('.list-row').forEach(r => {
      r.classList.remove('selected', 'selected-rev');
    });
    el.classList.add('selected');

    if (colId === 'col1') {
      document.getElementById('col3').innerHTML =
        '<div class="empty-state"><div class="icon">↑</div>Select source &amp; target roles</div>';
      document.getElementById('col4').innerHTML =
        '<div class="empty-state">Select a port entry to see matching rules</div>';
    }
    if (colId === 'col2') {
      document.getElementById('col4').innerHTML =
        '<div class="empty-state">Select a port entry to see matching rules</div>';
    }
  }

  function selectPortRow(el) {
    const col3 = document.getElementById('col3');
    col3.querySelectorAll('.list-row').forEach(r => {
      r.classList.remove('selected', 'selected-rev');
    });
    const isReverse = el.querySelector('.prefix-tag.reverse') !== null;
    el.classList.add(isReverse ? 'selected-rev' : 'selected');
  }
</script>

</body>
</html>
